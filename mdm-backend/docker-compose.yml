version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mdm-postgres
    environment:
      POSTGRES_DB: mdm
      POSTGRES_USER: mdm_user
      POSTGRES_PASSWORD: mdm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdm_user -d mdm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
